<!DOCTYPE html>
<html>
<head>
<title>AI Digital Twin Pro</title>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: linear-gradient(135deg, #0f172a, #020617);
    color: white;
}

/* Layout */
.container {
    display: flex;
    height: 100vh;
}

/* Sidebar */
.sidebar {
    width: 260px;
    background: rgba(30, 41, 59, 0.8);
    backdrop-filter: blur(12px);
    padding: 20px;
    border-right: 1px solid rgba(255,255,255,0.1);
}

.sidebar input {
    width: 100%;
    padding: 10px;
    margin-bottom: 10px;
    border-radius: 10px;
    border: none;
    background: #0f172a;
    color: white;
}

.sidebar button {
    width: 100%;
    padding: 10px;
    border-radius: 10px;
    border: none;
    background: #6366f1;
    color: white;
    cursor: pointer;
}

.sidebar button:hover {
    background: #4f46e5;
}

/* Profile */
.profile {
    text-align: center;
    margin-bottom: 25px;
}

.profile img {
    width: 70px;
    border-radius: 50%;
}

.profile h3 {
    margin: 8px 0 4px;
}

.profile p {
    font-size: 12px;
    color: #94a3b8;
}

/* Chat area */
.chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
}

/* Header */
.header {
    padding: 15px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    font-weight: bold;
}

/* Chat */
.chat-box {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
}

/* Message */
.message {
    display: flex;
    align-items: flex-end;
    margin-bottom: 15px;
}

.bubble {
    padding: 12px 16px;
    border-radius: 16px;
    max-width: 60%;
    white-space: pre-wrap;
}

/* User */
.user {
    justify-content: flex-end;
}

.user .bubble {
    background: #6366f1;
}

/* Bot */
.bot .bubble {
    background: #1e293b;
}

/* Avatar */
.avatar {
    width: 35px;
    height: 35px;
    border-radius: 50%;
    margin: 0 10px;
}

/* Input */
.input-area {
    display: flex;
    padding: 15px;
    border-top: 1px solid rgba(255,255,255,0.1);
}

.input-area input {
    flex: 1;
    padding: 12px;
    border-radius: 12px;
    border: none;
    background: #0f172a;
    color: white;
}

.input-area button {
    margin-left: 10px;
    padding: 12px 20px;
    border-radius: 12px;
    border: none;
    background: #6366f1;
    color: white;
    cursor: pointer;
}

/* Typing */
.typing {
    font-size: 14px;
    opacity: 0.6;
    margin-left: 50px;
}
</style>

</head>

<body>

<div class="container">

    <!-- Sidebar -->
    <div class="sidebar">

        <!-- PROFILE (THIS IS WHAT YOU ASKED) -->
        <div class="profile">
            <img src="{{ avatar }}">
            <h3>{{ name }}</h3>
            <p>{{ bio }}</p>
        </div>

        <h2>🧠 Decision</h2>

        <input id="context" placeholder="Situation">
        <input id="a" placeholder="Option A">
        <input id="b" placeholder="Option B">

        <button onclick="decide()">Decide</button>

    </div>

    <!-- Chat -->
    <div class="chat-area">

        <div class="header">AI Digital Twin Pro</div>

        <div class="chat-box" id="chat"></div>

        <div id="typing" class="typing"></div>

        <div class="input-area">
            <input id="msg" placeholder="Message..." autofocus>
            <button onclick="chat()">Send</button>
        </div>

    </div>

</div>

<script>

function addMessage(text, type){
    let container = document.createElement("div");
    container.className = "message " + type;

    let bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.innerText = text;

    let avatar = document.createElement("img");
    avatar.className = "avatar";

    if(type === "user"){
        avatar.src = "https://i.pravatar.cc/40?img=3";
        container.appendChild(bubble);
        container.appendChild(avatar);
    } else {
        avatar.src = "https://i.pravatar.cc/40?img=5";
        container.appendChild(avatar);
        container.appendChild(bubble);
    }

    document.getElementById("chat").appendChild(container);

    document.getElementById("chat").scrollTop =
        document.getElementById("chat").scrollHeight;
}

function chat(){
    let input = document.getElementById("msg");
    let message = input.value.trim();
    if(!message) return;

    addMessage(message, "user");

    input.value = "";
    input.focus();

    document.getElementById("typing").innerText = "Typing...";

    fetch('/chat',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({message:message})
    })
    .then(r=>r.json())
    .then(d=>{
        document.getElementById("typing").innerText = "";
        addMessage(d.reply, "bot");
    });
}

function decide(){
    let context = document.getElementById("context").value;
    let a = document.getElementById("a").value;
    let b = document.getElementById("b").value;

    fetch('/decide',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({context:context,a:a,b:b})
    })
    .then(r=>r.json())
    .then(d=>{
        addMessage(
            "Decision: " + d.decision +
            "\nConfidence: " + d.confidence + "%" +
            "\nReason: " + d.reason,
            "bot"
        );
    });
}

/* ENTER KEY SUPPORT */
document.getElementById("msg").addEventListener("keydown", function(e){
    if(e.key === "Enter"){
        e.preventDefault();
        chat();
    }
});

</script>

</body>
</html>
