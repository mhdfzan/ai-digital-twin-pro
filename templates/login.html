<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI DigiTwin — Access Portal</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Manrope:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        :root {
            --primary: #00f5ff;
            --primary-dim: #00dce5;
            --secondary: #ddb7ff;
            --tertiary: #a3f421;
            --bg: #0b1326;
            --outline: #3a494a;
            --text: #dae2fd;
            --text-muted: #b9caca;
        }

        body {
            font-family: 'Manrope', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }

        .grid-bg {
            position: fixed;
            inset: 0;
            background-image: linear-gradient(to right, rgba(58, 73, 74, 0.12) 1px, transparent 1px), linear-gradient(to bottom, rgba(58, 73, 74, 0.12) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        .glow-1 {
            position: fixed;
            top: -20%;
            left: -20%;
            width: 70vw;
            height: 70vh;
            background: radial-gradient(circle, rgba(0, 245, 255, 0.07) 0%, transparent 65%);
            filter: blur(60px);
            pointer-events: none;
            z-index: 0;
        }

        .glow-2 {
            position: fixed;
            bottom: -20%;
            right: -20%;
            width: 60vw;
            height: 60vh;
            background: radial-gradient(circle, rgba(221, 183, 255, 0.07) 0%, transparent 65%);
            filter: blur(60px);
            pointer-events: none;
            z-index: 0;
        }

        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 40px;
            background: rgba(11, 19, 38, 0.6);
            backdrop-filter: blur(24px);
            border-bottom: 1px solid rgba(0, 245, 255, 0.06);
        }

        .logo {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 0.3em;
            color: var(--primary);
            text-shadow: 0 0 20px rgba(0, 245, 255, 0.5);
            text-transform: uppercase;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            font-family: 'Space Grotesk', sans-serif;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        .sdot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--primary);
            box-shadow: 0 0 8px var(--primary);
            animation: blink 2s infinite;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: 0.3
            }
        }

        .wrap {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 440px;
            padding: 20px;
            animation: up 0.6s ease both;
        }

        @keyframes up {
            from {
                opacity: 0;
                transform: translateY(24px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .card {
            background: rgba(19, 27, 46, 0.7);
            backdrop-filter: blur(32px);
            border: 1px solid rgba(0, 245, 255, 0.1);
            border-radius: 28px;
            padding: 48px 40px;
            box-shadow: 0 0 60px rgba(0, 245, 255, 0.06), 0 32px 80px rgba(0, 0, 0, 0.4);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0, 245, 255, 0.4), transparent);
        }

        .tag {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 10px;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: var(--primary);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tag::before {
            content: '';
            display: inline-block;
            width: 20px;
            height: 1px;
            background: var(--primary);
            box-shadow: 0 0 6px var(--primary);
        }

        .card h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 36px;
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }

        .card h1 span {
            color: var(--primary);
        }

        .card p {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 36px;
            line-height: 1.6;
        }

        .field {
            margin-bottom: 16px;
        }

        .field label {
            display: block;
            font-size: 10px;
            font-family: 'Space Grotesk', sans-serif;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .iw {
            position: relative;
        }

        .iw .material-symbols-outlined {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            color: var(--text-muted);
            pointer-events: none;
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 20;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 14px 14px 14px 44px;
            background: rgba(11, 19, 38, 0.8);
            border: 1px solid rgba(58, 73, 74, 0.5);
            border-radius: 12px;
            color: var(--text);
            font-family: 'Manrope', sans-serif;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        input::placeholder {
            color: rgba(185, 202, 202, 0.3);
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 245, 255, 0.08), 0 0 20px rgba(0, 245, 255, 0.1);
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--primary-dim), var(--primary));
            border: none;
            border-radius: 12px;
            color: #003739;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 13px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 24px rgba(0, 245, 255, 0.3);
            margin-top: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 40px rgba(0, 245, 255, 0.5);
        }

        .err {
            color: #f87171;
            font-size: 12px;
            text-align: center;
            margin-top: 12px;
            padding: 10px;
            background: rgba(248, 113, 113, 0.08);
            border-radius: 8px;
            border: 1px solid rgba(248, 113, 113, 0.2);
        }

        .div {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 24px 0;
            color: var(--text-muted);
            font-size: 11px;
        }

        .div::before,
        .div::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(58, 73, 74, 0.4);
        }

        .link {
            text-align: center;
            font-size: 13px;
            color: var(--text-muted);
        }

        .link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .link a:hover {
            text-shadow: 0 0 10px var(--primary);
        }
    </style>
</head>

<body>
    <div class="grid-bg"></div>
    <div class="glow-1"></div>
    <div class="glow-2"></div>
    <nav>
        <div class="logo">AI DigiTwin</div>
        <div class="nav-right"><span class="sdot"></span>Neural Gateway Active</div>
    </nav>
    <div class="wrap">
        <div class="card">
            <div class="tag">Access Portal</div>
            <h1>NEURAL<br /><span>NEXUS</span></h1>
            <p>Authenticate to access your digital twin instance and consciousness extension.</p>
            <form method="POST" action="/login">
                <div class="field">
                    <label>Identity Key</label>
                    <div class="iw">
                        <span class="material-symbols-outlined">person</span>
                        <input name="username" type="text" placeholder="Enter username" required
                            autocomplete="username" />
                    </div>
                </div>
                <div class="field">
                    <label>Access Code</label>
                    <div class="iw">
                        <span class="material-symbols-outlined">lock</span>
                        <input name="password" type="password" placeholder="Enter password" required
                            autocomplete="current-password" />
                    </div>
                </div>
                <button type="submit" class="btn">
                    <span class="material-symbols-outlined" style="font-size:18px;">auto_awesome</span>
                    Initiate Access
                </button>
            </form>
            {% if error %}<div class="err">⚠ {{ error }}</div>{% endif %}
            <div class="div">or</div>
            <div class="link">New instance? <a href="/signup">Create Profile →</a></div>
        </div>
    </div>
</body>

</html>
